<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #1a1a2e; padding: 40px 0"
    >
      <tr>
        <td align="center">
          <table
            width="480"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              border-radius: 16px;
              padding: 40px;
              box-shadow: 0 4px 24px rgba(0, 0, 0, 0.2);
            "
          >
            <tr>
              <td align="center" style="padding-bottom: 24px">
                <h1 style="margin: 0; font-size: 24px; color: #1a1a2e">
                  Cert Study Assistant
                </h1>
              </td>
            </tr>
            <tr>
              <td style="color: #474747; font-size: 15px; line-height: 1.6">
                <p style="margin: 0 0 16px">Hello,</p>
                <p style="margin: 0 0 16px">
                  Your account has been created. Use the credentials below to
                  sign in:
                </p>
                <table
                  width="100%"
                  cellpadding="12"
                  cellspacing="0"
                  style="
                    background-color: #f0f4ff;
                    border-radius: 8px;
                    margin: 16px 0;
                  "
                >
                  <tr>
                    <td style="color: #1a1a2e; font-size: 14px">
                      <strong>Username:</strong> {username}<br />
                      <strong>Temporary password:</strong> {####}
                    </td>
                  </tr>
                </table>
                <p style="margin: 16px 0 0; font-size: 13px; color: #474747">
                  You will be asked to set a new password on your first login.
                </p>
              </td>
            </tr>
            <tr>
              <td
                align="center"
                style="
                  padding-top: 32px;
                  border-top: 1px solid #e0e0e0;
                  margin-top: 24px;
                "
              >
                <p style="margin: 0; font-size: 12px; color: #474747">
                  This is an automated message from Cert Study Assistant.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
